name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - uses: biomejs/setup-biome@v2
        with:
          version: latest

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: biome ci .

      - name: Build core
        run: pnpm --filter @walkthru-earth/geocoding-core build

      - name: Type check
        run: pnpm check

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm --filter @walkthru-earth/geocoding-core test:coverage -- --reporter=default --reporter=json --outputFile=test-results.json

      - name: Coverage PR comment
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: packages/core

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @walkthru-earth/geocoding-core build

      - name: Build playground
        run: pnpm --filter playground build
        env:
          VITE_POSTHOG_KEY: ''
          VITE_POSTHOG_HOST: ''

      - name: Install Playwright Chromium
        working-directory: apps/playground
        run: pnpx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: apps/playground
        run: pnpx playwright test

      - name: E2E test report PR comment
        if: github.event_name == 'pull_request' && always()
        uses: daun/playwright-report-summary@v3
        with:
          report-file: apps/playground/test-results/results.json
          comment-title: 'Playwright E2E Results'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/playground/playwright-report/
          retention-days: 7
