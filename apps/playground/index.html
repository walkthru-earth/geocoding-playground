<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#FAFAF8" media="(prefers-color-scheme: light)" />
    <script>
      // Apply saved theme before first paint to avoid flash
      const t = localStorage.getItem('theme');
      if (t === 'light') document.documentElement.setAttribute('data-theme', 'walkthru-light');
      else if (t === 'dark') document.documentElement.setAttribute('data-theme', 'walkthru-dark');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Geocoding Playground</title>
    <!-- maplibre-gl externalized due to Vite 8 Rolldown minification bug (maplibre/maplibre-gl-js#7339) -->
    <script type="importmap">
      { "imports": { "maplibre-gl": "https://esm.sh/maplibre-gl@5.21.1" } }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
